<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIDE Chess</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;
  --gold:#c9a84c;--gold-light:#e8c96a;--gold-dim:#7a6535;
  --light-sq:#e8d5b0;--dark-sq:#8b6914;
  --text:#d4c5a0;--text-dim:#7a6e58;
  --white-piece:#f5f0e8;--black-piece:#1a1212;
  --check:#dc3232;--valid:rgba(60,200,100,0.7);
}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:16px;
  background-image:radial-gradient(ellipse at 15% 15%,rgba(201,168,76,.04) 0%,transparent 55%),
                   radial-gradient(ellipse at 85% 85%,rgba(201,168,76,.03) 0%,transparent 55%)}
header{text-align:center;margin-bottom:18px;animation:fadeDown .7s ease both}
h1{font-family:'Cinzel',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;
  letter-spacing:.15em;
  background:linear-gradient(135deg,var(--gold-dim) 0%,var(--gold-light) 50%,var(--gold-dim) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:.85rem;color:var(--text-dim);letter-spacing:.3em;text-transform:uppercase;
  font-style:italic;margin-top:3px}

.game-layout{display:flex;gap:22px;align-items:flex-start;flex-wrap:wrap;justify-content:center;
  animation:fadeUp .7s .15s ease both}

/* ── Board ── */
.board-frame{background:linear-gradient(145deg,#2a2010,#1a1508,#2a2010);
  padding:14px;border-radius:4px;position:relative;
  box-shadow:0 0 0 1px var(--gold-dim),0 0 40px rgba(201,168,76,.12),0 20px 50px rgba(0,0,0,.7)}
.board-frame::before{content:'';position:absolute;inset:4px;
  border:1px solid rgba(201,168,76,.18);border-radius:2px;pointer-events:none}
.coord-files{display:flex;padding-left:20px;margin-bottom:3px}
.coord-ranks{display:flex;flex-direction:column;justify-content:space-around;
  padding-right:6px;width:20px}
.coord-label{font-family:'Cinzel',serif;font-size:.6rem;color:var(--gold-dim)}
.coord-files .coord-label{width:56px;text-align:center}
.board-row{display:flex}
.board{display:grid;grid-template-columns:repeat(8,56px);grid-template-rows:repeat(8,56px);
  border:2px solid var(--gold-dim);box-shadow:inset 0 0 18px rgba(0,0,0,.5)}
.sq{width:56px;height:56px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;transition:filter .12s}
.sq.light{background:var(--light-sq)}.sq.dark{background:var(--dark-sq)}
.sq:hover{filter:brightness(1.1)}
.sq.selected{background:#e8c000!important;box-shadow:inset 0 0 0 3px rgba(255,255,255,.35)}
.sq.last-from,.sq.last-to{background:rgba(255,215,0,.22)!important}
.sq.valid::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;
  background:var(--valid);box-shadow:0 0 7px rgba(60,200,100,.4);pointer-events:none;
  animation:pulse 1.4s infinite}
.sq.valid-cap::after{content:'';position:absolute;inset:4px;border-radius:50%;
  border:4px solid rgba(60,200,100,.6);pointer-events:none}
.sq.in-check{background:rgba(220,50,50,.55)!important;animation:flashRed .55s ease}
.piece{font-size:38px;line-height:1;user-select:none;
  filter:drop-shadow(1px 2px 3px rgba(0,0,0,.55));position:relative;z-index:1;
  transition:transform .12s}
.piece:hover{transform:scale(1.07)}

/* ── Sidebar ── */
.sidebar{display:flex;flex-direction:column;gap:13px;width:230px;min-width:190px}
.panel{background:var(--surface);border:1px solid rgba(201,168,76,.18);
  border-radius:4px;padding:14px;box-shadow:0 4px 18px rgba(0,0,0,.3)}
.panel-title{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--gold-dim);margin-bottom:10px;
  padding-bottom:7px;border-bottom:1px solid rgba(201,168,76,.13)}

/* Status */
.status-text{font-family:'Cinzel',serif;font-size:.95rem;font-weight:600;
  text-align:center;padding:7px;border-radius:3px;letter-spacing:.05em}
.status-text.active{color:var(--text)}
.status-text.check{color:#ff9933;background:rgba(255,153,51,.1)}
.status-text.checkmate{color:#e05555;background:rgba(220,50,50,.1)}
.status-text.draw{color:var(--gold);background:rgba(201,168,76,.1)}
.status-text.stalemate{color:#aaa;background:rgba(150,150,150,.1)}
.turn-indicator{display:flex;align-items:center;gap:10px;margin-top:9px;justify-content:center}
.turn-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--gold-dim);transition:all .3s}
.turn-dot.white{background:var(--white-piece);box-shadow:0 0 7px rgba(245,240,232,.4)}
.turn-dot.black{background:var(--black-piece);box-shadow:0 0 7px rgba(0,0,0,.4)}

/* Clock row */
.clocks{display:flex;justify-content:space-between;margin-top:8px;gap:6px}
.clock-box{flex:1;background:rgba(0,0,0,.25);border:1px solid rgba(201,168,76,.12);
  border-radius:3px;padding:5px 8px;text-align:center}
.clock-label{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim)}
.clock-val{font-family:'Cinzel',serif;font-size:.95rem;color:var(--gold)}

/* Move history */
.move-list{max-height:200px;overflow-y:auto;font-size:.8rem;color:var(--text-dim);
  scrollbar-width:thin;scrollbar-color:var(--gold-dim) transparent}
.move-list::-webkit-scrollbar{width:3px}
.move-list::-webkit-scrollbar-thumb{background:var(--gold-dim)}
.move-pair{display:flex;gap:6px;padding:3px 4px;border-radius:2px;align-items:center}
.move-pair:nth-child(even){background:rgba(255,255,255,.02)}
.move-pair.latest{background:rgba(201,168,76,.07)}
.move-num{color:var(--gold-dim);font-size:.7rem;min-width:18px}
.move-w{font-family:'Cinzel',serif;font-size:.72rem;color:#c8bfa0}
.move-b{font-family:'Cinzel',serif;font-size:.72rem;color:#8a8070}

/* Draw offer banner */
.draw-banner{display:none;background:rgba(201,168,76,.08);border:1px solid var(--gold-dim);
  border-radius:3px;padding:10px;text-align:center;margin-top:6px}
.draw-banner.visible{display:block}
.draw-banner p{font-size:.82rem;margin-bottom:7px;color:var(--gold)}
.draw-btns{display:flex;gap:6px}

/* Info row */
.info-row{display:flex;justify-content:space-between;font-size:.75rem;
  color:var(--text-dim);margin-top:6px}
.info-row span{font-family:'Cinzel',serif;font-size:.68rem}

/* Buttons */
.btn{width:100%;padding:9px;font-family:'Cinzel',serif;font-size:.7rem;
  letter-spacing:.14em;text-transform:uppercase;background:transparent;
  color:var(--gold);border:1px solid var(--gold-dim);border-radius:3px;
  cursor:pointer;transition:all .18s;margin-top:3px}
.btn:hover{background:rgba(201,168,76,.1);border-color:var(--gold);
  box-shadow:0 0 13px rgba(201,168,76,.18)}
.btn:active{transform:scale(.98)}
.btn.danger{color:#e05555;border-color:#7a2828}
.btn.danger:hover{background:rgba(220,50,50,.1);border-color:#e05555}
.btn-row{display:flex;gap:6px}
.btn-row .btn{font-size:.62rem}

/* Promotion modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);
  z-index:100;align-items:center;justify-content:center}
.modal-overlay.visible{display:flex;animation:fadeIn .2s ease}
.modal{background:var(--surface2);border:1px solid var(--gold-dim);border-radius:6px;
  padding:26px;text-align:center;box-shadow:0 0 55px rgba(201,168,76,.18);
  animation:scaleIn .22s ease}
.modal h3{font-family:'Cinzel',serif;color:var(--gold);font-size:1.05rem;
  letter-spacing:.1em;margin-bottom:18px}
.promo-row{display:flex;gap:14px;justify-content:center}
.promo-btn{font-size:44px;background:var(--surface);border:1px solid var(--gold-dim);
  border-radius:4px;cursor:pointer;padding:7px 10px;transition:all .18s;line-height:1}
.promo-btn:hover{background:rgba(201,168,76,.14);border-color:var(--gold);transform:scale(1.1)}

/* Game over banner */
.game-over{display:none;background:linear-gradient(135deg,#1a1200,#2a2000);
  border:1px solid var(--gold);border-radius:4px;padding:14px 18px;
  text-align:center;margin-bottom:14px;box-shadow:0 0 28px rgba(201,168,76,.28)}
.game-over.visible{display:block;animation:fadeDown .45s ease}
.go-title{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--gold-light);
  letter-spacing:.1em;margin-bottom:3px}
.go-sub{font-size:.85rem;color:var(--text-dim);font-style:italic}

/* FIDE rule badge */
.rule-badge{display:inline-block;background:rgba(201,168,76,.08);
  border:1px solid rgba(201,168,76,.2);border-radius:2px;
  font-size:.62rem;color:var(--gold-dim);padding:1px 5px;margin-left:4px;
  font-family:'Cinzel',serif;letter-spacing:.05em;vertical-align:middle}

@keyframes fadeDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.13);opacity:1}}
@keyframes flashRed{0%,100%{filter:brightness(1)}50%{filter:brightness(1.45)}}

@media(max-width:680px){
  .board{grid-template-columns:repeat(8,42px);grid-template-rows:repeat(8,42px)}
  .sq{width:42px;height:42px}.piece{font-size:28px}
  .coord-files .coord-label{width:42px}
  .sidebar{width:100%}
}
</style>
</head>
<body>
<header>
  <h1>♟ FIDE CHESS</h1>
  <p class="subtitle">Official Rules · All Laws Applied</p>
</header>

<div class="game-over" id="gameOver">
  <div class="go-title" id="goTitle"></div>
  <div class="go-sub"   id="goSub"></div>
</div>

<div class="game-layout">
  <!-- Board -->
  <div>
    <div class="board-frame">
      <div class="coord-files" id="cFiles"></div>
      <div style="display:flex">
        <div class="coord-ranks" id="cRanks"></div>
        <div class="board" id="board"></div>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <!-- Status -->
    <div class="panel">
      <div class="panel-title">Game Status</div>
      <div class="status-text active" id="statusText">White to move</div>
      <div class="turn-indicator">
        <div class="turn-dot white" id="turnDot"></div>
        <span id="turnLabel">White</span>
      </div>
      <div class="clocks">
        <div class="clock-box">
          <div class="clock-label">White</div>
          <div class="clock-val" id="wClock">—</div>
        </div>
        <div class="clock-box">
          <div class="clock-label">Black</div>
          <div class="clock-val" id="bClock">—</div>
        </div>
      </div>
      <div class="info-row">
        <span>Move <span id="moveNum">1</span></span>
        <span>50-rule: <span id="halfClock">0</span>/100</span>
      </div>
    </div>

    <!-- Move History (SAN – Appendix C) -->
    <div class="panel">
      <div class="panel-title">Move History <span class="rule-badge">App. C</span></div>
      <div class="move-list" id="moveList"></div>
    </div>

    <!-- Actions -->
    <div class="panel">
      <div class="panel-title">Actions</div>
      <!-- Draw offer (Art 9.1) -->
      <div class="btn-row">
        <button class="btn" id="drawWhiteBtn" onclick="offerDraw('WHITE')" title="Art 9.1">⚖ Offer Draw (W)</button>
        <button class="btn" id="drawBlackBtn" onclick="offerDraw('BLACK')" title="Art 9.1">⚖ Offer Draw (B)</button>
      </div>
      <!-- Draw offer pending banner -->
      <div class="draw-banner" id="drawBanner">
        <p id="drawBannerText">Draw offered!</p>
        <div class="draw-btns">
          <button class="btn" onclick="acceptDraw()">✓ Accept</button>
          <button class="btn danger" onclick="hideDraw()">✗ Decline</button>
        </div>
      </div>
      <!-- Resign (Art 5.1b) -->
      <div class="btn-row" style="margin-top:4px">
        <button class="btn danger" onclick="resign('WHITE')" title="Art 5.1b">⚑ Resign (W)</button>
        <button class="btn danger" onclick="resign('BLACK')" title="Art 5.1b">⚑ Resign (B)</button>
      </div>
      <button class="btn" style="margin-top:6px" id="newBtn" onclick="newGame()">✦ New Game</button>
    </div>

    <!-- FIDE Rules legend -->

    <div class="panel">
      <div class="panel-title">FIDE Rules Active</div>
      <div style="font-size:.72rem;color:var(--text-dim);line-height:1.8">
        <div>Art 3.7d &nbsp;En passant</div>
        <div>Art 3.7e &nbsp;Pawn promotion</div>
        <div>Art 3.8 &nbsp;&nbsp;Castling (both sides)</div>
        <div>Art 3.8b &nbsp;Castling rights</div>
        <div>Art 3.9 &nbsp;&nbsp;Check / exposing king</div>
        <div>Art 5.1 &nbsp;&nbsp;Checkmate</div>
        <div>Art 5.2a &nbsp;Stalemate</div>
        <div>Art 5.2b &nbsp;Dead position</div>
        <div>Art 9.1 &nbsp;&nbsp;Draw agreement</div>
        <div>Art 9.2 &nbsp;&nbsp;Threefold repetition</div>
        <div>Art 9.3 &nbsp;&nbsp;Fifty-move rule</div>
        <div>App. C &nbsp;&nbsp;SAN notation</div>

      </div>
    </div>

  </div>
</div>

<!-- Promotion Modal (Art 3.7e) -->
<div class="modal-overlay" id="promoModal">
  <div class="modal">
    <h3>Promote Pawn <span class="rule-badge">Art 3.7e</span></h3>
    <p style="font-size:.8rem;color:var(--text-dim);margin-bottom:14px">
      Must exchange for Queen, Rook, Bishop, or Knight
    </p>
    <div class="promo-row" id="promoRow"></div>
  </div>
</div>

<script>
const API = '/api/chess';
let gameId = null, gs = null, selected = null, validMoves = [], pendingPromo = null;
let drawOfferedBy = null;

const SYMS = {
  WHITE_KING:'♔',WHITE_QUEEN:'♕',WHITE_ROOK:'♖',
  WHITE_BISHOP:'♗',WHITE_KNIGHT:'♘',WHITE_PAWN:'♙',
  BLACK_KING:'♚',BLACK_QUEEN:'♛',BLACK_ROOK:'♜',
  BLACK_BISHOP:'♝',BLACK_KNIGHT:'♞',BLACK_PAWN:'♟',
};

async function req(method, path, body) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API+path, opts);
  return r.ok ? r.json() : null;
}

async function newGame() {
  selected=null; validMoves=[]; drawOfferedBy=null;
  document.getElementById('drawBanner').classList.remove('visible');
  gs = await req('POST','/new');
  if(gs){gameId=gs.gameId; renderAll();}
}

async function clickSquare(row, col) {
  if(!gs) return;
  const done = ['CHECKMATE','STALEMATE','DRAW_AGREEMENT','DRAW_THREEFOLD',
                'DRAW_FIFTY_MOVES','DRAW_INSUFFICIENT_MATERIAL','RESIGNED'];
  if(done.includes(gs.status)) return;

  if(selected) {
    const ok = validMoves.some(m=>m[0]===row&&m[1]===col);
    if(ok) {
      const fp = gs.board[selected[0]][selected[1]];
      if(fp&&fp.type==='PAWN'&&(row===0||row===7)) {
        pendingPromo={fr:selected[0],fc:selected[1],tr:row,tc:col};
        showPromo(fp.color); return;
      }
      await doMove(selected[0],selected[1],row,col,null); return;
    }
  }
  const p = gs.board[row][col];
  if(p && p.color===gs.currentTurn) {
    selected=[row,col];
    const data = await req('GET',`/${gameId}/moves/${row}/${col}`);
    if(data){validMoves=data.validMovesForSelected||[];gs=data;renderBoard();}
  } else { selected=null; validMoves=[]; renderBoard(); }
}

async function doMove(fr,fc,tr,tc,promo) {
  const body={fromRow:fr,fromCol:fc,toRow:tr,toCol:tc};
  if(promo) body.promotion=promo;
  const data = await req('POST',`/${gameId}/move`,body);
  if(data){gs=data; selected=null; validMoves=[]; renderAll();}
}

function showPromo(color) {
  const pieces=['QUEEN','ROOK','BISHOP','KNIGHT'];
  const ws={QUEEN:'♕',ROOK:'♖',BISHOP:'♗',KNIGHT:'♘'};
  const bs={QUEEN:'♛',ROOK:'♜',BISHOP:'♝',KNIGHT:'♞'};
  const syms = color==='WHITE'?ws:bs;
  const row = document.getElementById('promoRow');
  row.innerHTML='';
  pieces.forEach(p=>{
    const btn=document.createElement('button');
    btn.className='promo-btn'; btn.textContent=syms[p]; btn.title=p;
    btn.onclick=async()=>{
      document.getElementById('promoModal').classList.remove('visible');
      const pd=pendingPromo; pendingPromo=null;
      await doMove(pd.fr,pd.fc,pd.tr,pd.tc,p);
    };
    row.appendChild(btn);
  });
  document.getElementById('promoModal').classList.add('visible');
}

async function offerDraw(color) {
  if(!gameId) return;
  gs = await req('POST',`/${gameId}/draw/offer`,{color});
  if(gs){ drawOfferedBy=color; renderAll(); }
}

async function acceptDraw() {
  if(!gameId||!drawOfferedBy) return;
  const accepting = drawOfferedBy==='WHITE'?'BLACK':'WHITE';
  gs = await req('POST',`/${gameId}/draw/accept`,{color:accepting});
  if(gs){drawOfferedBy=null; document.getElementById('drawBanner').classList.remove('visible'); renderAll();}
}

function hideDraw() {
  drawOfferedBy=null; document.getElementById('drawBanner').classList.remove('visible');
}

async function resign(color) {
  if(!gameId) return;
  gs = await req('POST',`/${gameId}/resign`,{color});
  if(gs) renderAll();
}

// ── Render ────────────────────────────────────────────────────────────────

function renderAll() {
  renderBoard(); renderSidebar(); renderGameOver();
}

function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML='';
  if(!gs) return;

  const hist = gs.moveHistory||[];
  const lastMove = hist.length>0 ? parseLastMove(hist[hist.length-1]) : null;
  const checkColor = (gs.status==='CHECK'||gs.status==='CHECKMATE')?gs.currentTurn:null;
  let kingCheckSq = null;
  if(checkColor) {
    for(let r=0;r<8;r++) for(let c=0;c<8;c++) {
      const p=gs.board[r][c];
      if(p&&p.type==='KING'&&p.color===checkColor) kingCheckSq=[r,c];
    }
  }

  for(let r=0;r<8;r++) for(let c=0;c<8;c++) {
    const sq=document.createElement('div');
    sq.className=`sq ${(r+c)%2===0?'light':'dark'}`;
    if(selected&&selected[0]===r&&selected[1]===c) sq.classList.add('selected');
    if(lastMove&&(
      (lastMove.fr===r&&lastMove.fc===c)||(lastMove.tr===r&&lastMove.tc===c)
    )) sq.classList.add('last-to');
    if(kingCheckSq&&kingCheckSq[0]===r&&kingCheckSq[1]===c) sq.classList.add('in-check');
    const isValid=validMoves.some(m=>m[0]===r&&m[1]===c);
    if(isValid) sq.classList.add(gs.board[r][c]?'valid-cap':'valid');
    const p=gs.board[r][c];
    if(p){
      const pe=document.createElement('span');
      pe.className='piece';
      pe.style.color=p.color==='WHITE'?'var(--white-piece)':'var(--black-piece)';
      if(p.color==='BLACK') pe.style.webkitTextStroke='0.5px rgba(255,255,255,.12)';
      pe.textContent=SYMS[p.color+'_'+p.type]||'?';
      sq.appendChild(pe);
    }
    sq.addEventListener('click',()=>clickSquare(r,c));
    boardEl.appendChild(sq);
  }

  // Coordinates
  const files=['a','b','c','d','e','f','g','h'];
  const ranks=['8','7','6','5','4','3','2','1'];
  document.getElementById('cFiles').innerHTML=files.map(f=>`<span class="coord-label">${f}</span>`).join('');
  document.getElementById('cRanks').innerHTML=ranks.map(r=>`<span class="coord-label">${r}</span>`).join('');
}

function parseLastMove(san) {
  // Try to extract last two coordinate squares from raw SAN for highlighting
  // We'll use gameState.lastMove which is set to the SAN string
  // Fallback: look at the move history and try to match coord patterns
  return null; // Highlighting via position comparison
}

function renderSidebar() {
  if(!gs) return;
  const status=gs.status, turn=gs.currentTurn;

  // Status text
  const st=document.getElementById('statusText');
  st.className='status-text';
  const statusMap = {
    CHECKMATE:'checkmate', STALEMATE:'stalemate',
    CHECK:'check',
    DRAW_AGREEMENT:'draw', DRAW_THREEFOLD:'draw',
    DRAW_FIFTY_MOVES:'draw', DRAW_INSUFFICIENT_MATERIAL:'draw',
    RESIGNED:'checkmate'
  };
  st.classList.add(statusMap[status]||'active');
  const statusLabels = {
    ACTIVE:`${cap(turn)} to move`,
    CHECK:`${cap(turn)} is in Check! ⚠`,
    CHECKMATE:`Checkmate — ${cap(gs.winner)} wins`,
    STALEMATE:'Stalemate — Draw',
    DRAW_AGREEMENT:'Draw by agreement',
    DRAW_THREEFOLD:'Draw — threefold repetition',
    DRAW_FIFTY_MOVES:'Draw — fifty-move rule',
    DRAW_INSUFFICIENT_MATERIAL:'Draw — insufficient material',
    RESIGNED:`${cap(gs.winner)} wins by resignation`
  };
  st.textContent = statusLabels[status]||`${cap(turn)} to move`;

  // Turn dot
  document.getElementById('turnDot').className=`turn-dot ${turn==='WHITE'?'white':'black'}`;
  document.getElementById('turnLabel').textContent=cap(turn);

  // Move/clock info
  document.getElementById('moveNum').textContent=gs.fullMoveNumber||1;
  document.getElementById('halfClock').textContent=gs.halfMoveClock||0;

  // Move history (SAN – Appendix C)
  const moves=gs.moveHistory||[];
  const list=document.getElementById('moveList');
  list.innerHTML='';
  for(let i=0;i<moves.length;i+=2){
    const div=document.createElement('div');
    div.className='move-pair'+(i>=moves.length-2?' latest':'');
    div.innerHTML=`<span class="move-num">${Math.floor(i/2)+1}.</span>
      <span class="move-w">${moves[i]||''}</span>
      <span class="move-b">${moves[i+1]||''}</span>`;
    list.appendChild(div);
  }
  list.scrollTop=list.scrollHeight;

  // Draw offer banner (Art 9.1)
  const banner=document.getElementById('drawBanner');
  if(gs.drawOfferedByWhite||gs.drawOfferedByBlack) {
    const offerer=gs.drawOfferedByWhite?'White':'Black';
    document.getElementById('drawBannerText').textContent=`${offerer} offers a draw`;
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }
}

function renderGameOver() {
  if(!gs) return;
  const termStates=['CHECKMATE','STALEMATE','DRAW_AGREEMENT','DRAW_THREEFOLD',
                    'DRAW_FIFTY_MOVES','DRAW_INSUFFICIENT_MATERIAL','RESIGNED'];
  const el=document.getElementById('gameOver');
  if(!termStates.includes(gs.status)){el.classList.remove('visible');return;}
  el.classList.add('visible');
  const titleMap={
    CHECKMATE:`♔ ${cap(gs.winner)} Wins by Checkmate`,
    STALEMATE:'⚖ Draw — Stalemate',
    DRAW_AGREEMENT:'⚖ Draw by Agreement',
    DRAW_THREEFOLD:'⚖ Draw — Threefold Repetition',
    DRAW_FIFTY_MOVES:'⚖ Draw — Fifty-Move Rule',
    DRAW_INSUFFICIENT_MATERIAL:'⚖ Draw — Insufficient Material',
    RESIGNED:`♔ ${cap(gs.winner)} Wins — Opponent Resigned`
  };
  const subMap={
    CHECKMATE:'The king is under attack with no legal escape. Art 5.1',
    STALEMATE:'No legal moves remain; king is not in check. Art 5.2a',
    DRAW_AGREEMENT:'Both players agreed to a draw. Art 9.1',
    DRAW_THREEFOLD:'The same position occurred three times. Art 9.2',
    DRAW_FIFTY_MOVES:'50 consecutive moves without a pawn move or capture. Art 9.3',
    DRAW_INSUFFICIENT_MATERIAL:'Neither side can force checkmate. Art 5.2b / 9.6',
    RESIGNED:'A player declared they resign. Art 5.1b'
  };
  document.getElementById('goTitle').textContent=titleMap[gs.status]||'Game Over';
  document.getElementById('goSub').textContent=subMap[gs.status]||'';
}

function cap(s){return s?s.charAt(0)+s.slice(1).toLowerCase():'';}

newGame();
</script>
