<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIDE Chess</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>♟ FIDE CHESS</h1>
  <p class="subtitle">Official Rules · All Laws Applied</p>
</header>

<div class="game-over" id="gameOver">
  <div class="go-title" id="goTitle"></div>
  <div class="go-sub"   id="goSub"></div>
</div>

<div class="game-layout">

  <!-- Board -->
  <div>
    <div class="board-frame">
      <div class="coord-files" id="cFiles"></div>
      <div style="display:flex">
        <div class="coord-ranks" id="cRanks"></div>
        <div class="board" id="board"></div>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <!-- Status panel -->
    <div class="panel">
      <div class="panel-title">Game Status</div>
      <div class="status-text active" id="statusText">White to move</div>
      <div class="turn-indicator">
        <div class="turn-dot white" id="turnDot"></div>
        <span id="turnLabel">White</span>
      </div>
      <div class="clocks">
        <div class="clock-box">
          <div class="clock-label">White</div>
          <div class="clock-val" id="wClock">—</div>
        </div>
        <div class="clock-box">
          <div class="clock-label">Black</div>
          <div class="clock-val" id="bClock">—</div>
        </div>
      </div>
      <div class="info-row">
        <span>Move <span id="moveNum">1</span></span>
        <span>50-rule: <span id="halfClock">0</span>/100</span>
      </div>
    </div>

    <!-- Move history (SAN – Appendix C) -->
    <div class="panel">
      <div class="panel-title">Move History <span class="rule-badge">App. C</span></div>
      <div class="move-list" id="moveList"></div>
    </div>

    <!-- Actions panel -->
    <div class="panel">
      <div class="panel-title">Actions</div>
      <div class="btn-row">
        <button class="btn" onclick="offerDraw('WHITE')" title="Art 9.1">⚖ Draw (W)</button>
        <button class="btn" onclick="offerDraw('BLACK')" title="Art 9.1">⚖ Draw (B)</button>
      </div>
      <div class="draw-banner" id="drawBanner">
        <p id="drawBannerText">Draw offered!</p>
        <div class="draw-btns">
          <button class="btn" onclick="acceptDraw()">✓ Accept</button>
          <button class="btn danger" onclick="hideDraw()">✗ Decline</button>
        </div>
      </div>
      <div class="btn-row" style="margin-top:4px">
        <button class="btn danger" onclick="resign('WHITE')" title="Art 5.1b">⚑ Resign (W)</button>
        <button class="btn danger" onclick="resign('BLACK')" title="Art 5.1b">⚑ Resign (B)</button>
      </div>
      <button class="btn" style="margin-top:6px" onclick="newGame()">✦ New Game</button>
    </div>


  </div>
</div>

<!-- Promotion modal (Art 3.7e) -->
<div class="modal-overlay" id="promoModal">
  <div class="modal">
    <h3>Promote Pawn <span class="rule-badge">Art 3.7e</span></h3>
    <p style="font-size:.8rem;color:var(--text-dim);margin-bottom:14px">
      Choose Queen, Rook, Bishop, or Knight
    </p>
    <div class="promo-row" id="promoRow"></div>
  </div>
</div>

<script src="js/chess.js"></script>
</body>
</html>
